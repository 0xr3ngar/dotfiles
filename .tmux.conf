set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
setw -g mode-keys vi
bind c new-window
bind , command-prompt -I "#W" "rename-window '%%'"
bind & kill-window
bind [ copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi q send -X cancel
bind-key -T copy-mode-vi Escape send -X cancel

bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3
bind -n M-5 select-window -t 4
bind -n M-6 select-window -t 5
bind -n M-7 select-window -t 6
bind -n M-8 select-window -t 7
bind -n M-9 select-window -t 8
bind -n M-0 select-window -t 9

set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -g focus-events on

set -sg escape-time 10

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind S choose-session
bind N command-prompt -p "Session name:" "new-session -s '%%'"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Ember theme
set -g status-position bottom
set -g status-style "bg=#1c1b19,fg=#d8d0c0"
set -g status-left-style "fg=#c8b468,bg=#1c1b19"
set -g status-left " #S "
set -g status-right-style "fg=#b0a898,bg=#1c1b19"
set -g status-right " #($HOME/scripts/tmux-battery.sh)  %H:%M "
set -g status-interval 10

setw -g window-status-style "fg=#908a7e,bg=#1c1b19"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#1c1b19,bg=#e08060,bold"
setw -g window-status-current-format " #I:#W "

set -g pane-border-style "fg=#3e3c38"
set -g pane-active-border-style "fg=#e08060"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=#e08060]● #[fg=#b0a898]#{pane_current_command} #[fg=#706c61]#{pane_current_path} , #[fg=#585550]#{pane_current_command} #[fg=#3e3c38]#{pane_current_path} }"
set -g message-style "fg=#1c1b19,bg=#c8b468"
